name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release (example: 0.2.0)
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Apply release version
        run: |
          npm version "$VERSION" --no-git-tag-version
          cd brand-styles
          npm version "$VERSION" --no-git-tag-version

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Validate publish artifacts
        run: npm run pack:check

      - name: Commit version bump
        run: |
          git add package.json brand-styles/package.json brand-styles/README.md
          if [ -f package-lock.json ]; then
            git add package-lock.json
          fi
          git commit -m "release: v$VERSION"
          git tag "v$VERSION"

      - name: Publish @fuggetlenfe/tokens
        run: npm publish --access public --provenance

      - name: Publish @fuggetlenfe/brand-styles
        run: cd brand-styles && npm publish --access public --provenance

      - name: Push release commit and tag
        run: git push origin main --follow-tags
